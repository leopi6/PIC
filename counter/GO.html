<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5月23日 09:50 倒计时</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .countdown-container {
            text-align: center;
            background: #34495e;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.2em;
            margin-bottom: 30px;
            color: #ecf0f1;
            font-weight: 600;
        }
        .time-blocks {
            display: flex;
            gap: 25px;
            justify-content: center;
        }
        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .number {
            font-size: 4.5em;
            font-weight: bold;
            background: #e74c3c;
            color: #ffffff;
            padding: 15px 25px;
            border-radius: 12px;
            min-width: 110px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
        }
        .label {
            margin-top: 15px;
            font-size: 1.1em;
            color: #bdc3c7;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="countdown-container">
        <h1>距离我原谅你还有</h1>
        <div class="time-blocks" id="countdown">
            <!-- 倒计时数字将通过 JS 动态注入这里 -->
            <div class="number" style="font-size: 2em; background: transparent; box-shadow: none;">计算中...</div>
        </div>
    </div>

    <script>
        // 自动获取当前年份，确保目标时间是今年的 5月23日
        const currentYear = new Date().getFullYear();
        // JavaScript 中 Date 对象的月份从 0 开始（0代表1月，4代表5月）
        const targetDate = new Date(currentYear, 4, 23, 9, 50, 0).getTime();

        const countdownElement = document.getElementById('countdown');

        // 设置定时器，每 1000 毫秒（1秒）执行一次
        const updateCountdown = setInterval(function() {
            // 获取当前时间的毫秒数
            const now = new Date().getTime();
            
            // 计算时间差
            const distance = targetDate - now;

            // 如果倒计时结束
            if (distance < 0) {
                clearInterval(updateCountdown);
                countdownElement.innerHTML = "<div class='number' style='font-size: 3em;'>时间到！</div>";
                return;
            }

            // 时间换算（向下取整）
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // 格式化输出（补零逻辑），并渲染到页面
            countdownElement.innerHTML = `
                <div class="time-block">
                    <span class="number">${days}</span>
                    <span class="label">天</span>
                </div>
                <div class="time-block">
                    <span class="number">${hours < 10 ? '0' + hours : hours}</span>
                    <span class="label">时</span>
                </div>
                <div class="time-block">
                    <span class="number">${minutes < 10 ? '0' + minutes : minutes}</span>
                    <span class="label">分</span>
                </div>
                <div class="time-block">
                    <span class="number">${seconds < 10 ? '0' + seconds : seconds}</span>
                    <span class="label">秒</span>
                </div>
            `;
        }, 1000);
    </script>
</body>
</html>
